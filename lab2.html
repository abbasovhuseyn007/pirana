<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<title>PIRAN IceCream SHOP </title>
<link rel="stylesheet" href="lab2.css">
</head>

<body>

<header>
<h1>PIRAN IceCream</h1>
<p>Olkenin 1 no DONDURMASI!</p>
</header>
<div id="notification-container"></div>
<div class="container">

<div class="product">
<h2>VANILLI</h2>
<p>Qiymət: 3.5 AZN</p>
<button onclick="buyCube('VANIL', this)">Satın al</button>
</div>

<div class="product">
<h2>KAKOLU</h2>
<p>Qiymət: 4 AZN</p>
<button onclick="buyCube('KAKAO', this)">Satın al</button>
</div>

<div class="product">
<h2>CIYELEK</h2>
<p>Qiymət: 4.5 AZN</p>
<button onclick="buyCube('CIYELEK', this)">Satın al</button></div>

<div id="notification-container"></div>

<div id="cart-icon" onclick="toggleCart()">
    🛒 <span id="cart-count"></span>
</div>

<div id="cart-panel">
    <h3>Səbətiniz</h3>
    <ul id="cart-items"></ul>
    <p>Cəmi: <span id="total-price">0</span> AZN</p>
    <button onclick="openCheckout()" style="background:#00ffae; color:#111; width:100%; margin-bottom:5px;">Sifarişi Tamamla</button>
    <button onclick="toggleCart()" style="background:#555; width:100%;">Bağla</button>
</div>

<div id="checkout-modal" class="modal">
    <div class="modal-content">
        <h2>💳 Ödəmə Məlumatları</h2>
        <p style="font-size: 13px; color: #ccc; margin-bottom: 15px;">Sifarişi tamamlamaq üçün məlumatları daxil edin:</p>
        
        <input type="text" id="cust-name" placeholder="Ad və Soyad">
        
        <input type="text" id="card-num" placeholder="Kart nömrəsi (16 rəqəm)" maxlength="16">
        
        <div style="display:flex; gap:10px;">
            <input type="text" id="card-date" placeholder="AA/İİ" style="width:50%" maxlength="5">
            <input type="password" id="card-cvv" placeholder="CVV" style="width:50%" maxlength="3">
        </div>
        
        <button onclick="completeOrder()" class="pay-btn">Təsdiqlə və Ödə</button>
        <button onclick="closeCheckout()" class="cancel-btn">Ləğv et</button>
    </div>
</div>
<script src="lab2.js"></script>
</body>
</html>
